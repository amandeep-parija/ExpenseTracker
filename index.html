<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav class="navbar">
            <h1>Expense Tracker</h1>
            <button class="task-btn">Add New Expenses</button>
        </nav>
        <div class="outer-table">
        <div class="table-box">
                <table>
                    <thead class="t-head">
                        <tr>
                            <th>Expense Title</th>
                            <th>Expense Amount</th>
                            <th>Expense Category</th>
                            <th>Total Expense</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- <tr>
                            <td>Bbbbbb</td>
                            <td>150</td>
                            <td>Food</td>
                            <td>150</td>
                            <td><button class="del-btn">Delete</button></td>
                        </tr> -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal add-new-task ">
        <div class="bg"></div>
                <div class="center">
                    <form id="form" class="center">
                        <input required type="text" id="task-title-input" placeholder="Expense Title" >
                        <input required type="number" id="task-amnt-input" placeholder="Amount">
                        <select required>
                            <option value="" selected disabled>Choose Category</option>
                            <option value="food">Food</option>
                            <option value="travel">Travel</option>
                            <option value="shopping">Shopping</option>
                            <option value="other">Other</option>
                        </select>
                        <button type="submit" class="add-btn">Add</button>
                    </form>  
                </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
